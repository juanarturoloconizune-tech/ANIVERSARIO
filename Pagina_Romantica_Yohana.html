<title>Nuestra Historia ❤️</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Verdana,sans-serif;background:#000}
#bg{position:fixed;inset:0;background:linear-gradient(180deg,#120014,#400020,#120014)}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw 2s infinite alternate}
@keyframes tw{from{opacity:.2}to{opacity:1}}
#content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;text-align:center;padding:20px}
h1{font-size:54px;color:#ff5b8f;text-shadow:0 0 15px #ff2d6d}
#type{font-size:26px;min-height:40px;margin-bottom:20px}
img{max-width:80vw;max-height:55vh;border-radius:20px;box-shadow:0 0 30px rgba(255,255,255,.5);opacity:0;transform:scale(.8);transition:1.5s}
.show{opacity:1;transform:scale(1)}
button{margin-top:20px;padding:15px 30px;border:none;border-radius:40px;background:#ff2d6d;color:#fff;font-size:20px;cursor:pointer}
.heart{position:fixed;color:#ff2d6d;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}
</style>

<button onclick="start()">Abrir mi corazón ❤️</button>
</div>
<script>
for(let i=0;i<150;i++){let s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';s.style.animationDelay=Math.random()*2+'s';document.body.appendChild(s);}
const text="Gracias por cada sonrisa, cada abrazo y cada momento a tu lado. Feliz aniversario, Yohana. Te amo con todo mi corazón ❤️";
let i=0;
function type(){
 if(i<text.length){document.getElementById('type').innerHTML+=text.charAt(i);i++;setTimeout(type,45);}
}
function hearts(){
setInterval(()=>{
let h=document.createElement('div');
h.className='heart';
h.innerHTML='❤';
h.style.left=Math.random()*100+'vw';
h.style.top='-20px';
h.style.fontSize=(20+Math.random()*30)+'px';
h.style.animationDuration=(4+Math.random()*4)+'s';
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},180);
}
function start(){
document.querySelector('button').remove();
type();
setTimeout(()=>document.getElementById('photo').classList.add('show'),2500);
hearts();
}
</script>
